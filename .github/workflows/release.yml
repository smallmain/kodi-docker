name: Publish Release Image

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kodi-docker
  CACHE_SCOPE: kodi-docker

permissions:
  contents: read
  packages: write

jobs:
  resolve-release-metadata:
    runs-on: ubuntu-latest
    outputs:
      git_tag: ${{ steps.release-metadata.outputs.git_tag }}
      is_latest_release: ${{ steps.release-metadata.outputs.is_latest_release }}
      kodi_version: ${{ steps.release-metadata.outputs.kodi_version }}
      release_version: ${{ steps.release-metadata.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: release-metadata
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          release_version="${RELEASE_TAG#v}"
          latest_release="$(jq -r '.latest_release' .github/kodi-release-map.json)"
          kodi_version="$(jq -r --arg git_tag "$RELEASE_TAG" '.releases[] | select(.git_tag == $git_tag) | .kodi_version' .github/kodi-release-map.json)"

          if [[ -z "$kodi_version" || "$kodi_version" == "null" ]]; then
            echo "No Kodi version mapping found for ${RELEASE_TAG}." >&2
            exit 1
          fi

          echo "git_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "kodi_version=${kodi_version}" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

          if [[ "$latest_release" == "$release_version" ]]; then
            echo "is_latest_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest_release=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-release-metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare platform metadata
        run: |
          platform='${{ matrix.platform }}'
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.resolve-release-metadata.outputs.release_version }}
            type=raw,value=latest,enable=${{ needs.resolve-release-metadata.outputs.is_latest_release == 'true' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            KODI_VERSION=${{ needs.resolve-release-metadata.outputs.kodi_version }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.IMAGE_NAME }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
      - resolve-release-metadata

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.resolve-release-metadata.outputs.release_version }}
            type=raw,value=latest,enable=${{ needs.resolve-release-metadata.outputs.is_latest_release == 'true' }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect merged image
        run: |
          docker buildx imagetools inspect '${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}'
