name: Auto Release

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: auto-release
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kodi-docker
  CACHE_SCOPE: kodi-docker

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.plan.outputs.should_release }}
      base_sha: ${{ steps.plan.outputs.base_sha }}
      kodi_version: ${{ steps.plan.outputs.kodi_version }}
      release_version: ${{ steps.plan.outputs.release_version }}
      git_tag: ${{ steps.plan.outputs.git_tag }}
      published_at: ${{ steps.plan.outputs.published_at }}
      candidate_sha: ${{ steps.commit.outputs.candidate_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch tags
        run: |
          git fetch --force --tags origin

      - name: Plan release
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base_sha="$(git rev-parse HEAD)"
          latest_release="$(jq -r '.latest_release' .github/kodi-release-map.json)"
          current_kodi_version="$(jq -r --arg release "$latest_release" '.releases[] | select(.release_version == $release) | .kodi_version' .github/kodi-release-map.json)"
          upstream_kodi_version="$(gh api repos/xbmc/xbmc/releases/latest --jq .tag_name)"

          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"

          if [[ -z "$current_kodi_version" || "$current_kodi_version" == "null" ]]; then
            echo "Could not resolve the current Kodi version from .github/kodi-release-map.json." >&2
            exit 1
          fi

          if [[ "$upstream_kodi_version" == "$current_kodi_version" ]]; then
            echo "No new Kodi release detected. Current mapped version: ${current_kodi_version}."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          highest_release="$(jq -r '[.releases[].release_version] | sort_by(split(".") | map(tonumber)) | last' .github/kodi-release-map.json)"
          highest_tag_release="$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n 1)"

          if [[ -n "$highest_tag_release" && "$highest_tag_release" != "$highest_release" ]]; then
            echo "Release map highest version ${highest_release} does not match git tags ${highest_tag_release}." >&2
            exit 1
          fi

          IFS='.' read -r highest_major _highest_minor _highest_patch <<< "$highest_release"
          release_version="$((highest_major + 1)).0.0"
          git_tag="v${release_version}"

          if git rev-parse "$git_tag" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "refs/tags/${git_tag}" >/dev/null 2>&1; then
            echo "Target tag ${git_tag} already exists; aborting to avoid a duplicate release." >&2
            exit 1
          fi

          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "kodi_version=${upstream_kodi_version}" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "git_tag=${git_tag}" >> "$GITHUB_OUTPUT"
          echo "published_at=${published_at}" >> "$GITHUB_OUTPUT"

      - name: Update release map and README files
        if: steps.plan.outputs.should_release == 'true'
        env:
          GIT_TAG: ${{ steps.plan.outputs.git_tag }}
          KODI_VERSION: ${{ steps.plan.outputs.kodi_version }}
          PUBLISHED_AT: ${{ steps.plan.outputs.published_at }}
          RELEASE_VERSION: ${{ steps.plan.outputs.release_version }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          path = Path('.github/kodi-release-map.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          release_version = os.environ['RELEASE_VERSION']
          git_tag = os.environ['GIT_TAG']
          kodi_version = os.environ['KODI_VERSION']
          published_at = os.environ['PUBLISHED_AT']

          releases = [
            release
            for release in data['releases']
            if release['release_version'] != release_version and release.get('git_tag') != git_tag
          ]
          releases.insert(
            0,
            {
              'release_version': release_version,
              'git_tag': git_tag,
              'kodi_version': kodi_version,
              'published_at': published_at,
            },
          )

          data['latest_release'] = release_version
          data['releases'] = releases
          path.write_text(json.dumps(data, indent=2) + '\n', encoding='utf-8')
          PY
          python3 .github/scripts/render_release_matrix.py

      - name: Commit release candidate
        if: steps.plan.outputs.should_release == 'true'
        id: commit
        env:
          GIT_TAG: ${{ steps.plan.outputs.git_tag }}
          KODI_VERSION: ${{ steps.plan.outputs.kodi_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/kodi-release-map.json README.md README.zh-CN.md
          git diff --cached --quiet && {
            echo "Expected release metadata changes, but nothing was staged." >&2
            exit 1
          }
          git commit -m "Release ${GIT_TAG} (Kodi ${KODI_VERSION})"
          echo "candidate_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package release candidate repository
        if: steps.plan.outputs.should_release == 'true'
        run: |
          tar -czf "${RUNNER_TEMP}/candidate-repo.tar.gz" .

      - name: Upload release candidate repository
        if: steps.plan.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: candidate-repo
          path: ${{ runner.temp }}/candidate-repo.tar.gz
          if-no-files-found: error
          retention-days: 1

  build:
    if: needs.prepare.outputs.should_release == 'true'
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Download release candidate repository
        uses: actions/download-artifact@v4
        with:
          name: candidate-repo
          path: ${{ runner.temp }}/candidate

      - name: Extract release candidate repository
        run: |
          mkdir -p "${RUNNER_TEMP}/repo"
          tar -xzf "${RUNNER_TEMP}/candidate/candidate-repo.tar.gz" -C "${RUNNER_TEMP}/repo"

      - name: Prepare platform metadata
        run: |
          platform='${{ matrix.platform }}'
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ${{ runner.temp }}/repo
          platforms: ${{ matrix.platform }}
          build-args: |
            KODI_VERSION=${{ needs.prepare.outputs.kodi_version }}
          labels: |
            org.opencontainers.image.revision=${{ needs.prepare.outputs.candidate_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.release_version }}
          tags: ${{ env.IMAGE_NAME }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release target is still current
        env:
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
          GIT_TAG: ${{ needs.prepare.outputs.git_tag }}
        run: |
          git fetch origin main --tags
          current_main="$(git rev-parse origin/main)"
          if [[ "$current_main" != "$BASE_SHA" ]]; then
            echo "main advanced from ${BASE_SHA} to ${current_main} while the release build was running." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${GIT_TAG}" >/dev/null 2>&1; then
            echo "Target tag ${GIT_TAG} already exists; aborting before manifest publication." >&2
            exit 1
          fi

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          docker buildx imagetools create \
            -t "${{ env.IMAGE_NAME }}:main" \
            -t "${{ env.IMAGE_NAME }}:latest" \
            -t "${{ env.IMAGE_NAME }}:${RELEASE_VERSION}" \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect merged image
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE_NAME }}:${RELEASE_VERSION}"

  finalize:
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - merge

    steps:
      - name: Download release candidate repository
        uses: actions/download-artifact@v4
        with:
          name: candidate-repo
          path: ${{ runner.temp }}/candidate

      - name: Restore release candidate repository
        run: |
          mkdir -p "${RUNNER_TEMP}/repo"
          tar -xzf "${RUNNER_TEMP}/candidate/candidate-repo.tar.gz" -C "${RUNNER_TEMP}/repo"

      - name: Push commit, tag, and GitHub release
        working-directory: ${{ runner.temp }}/repo
        env:
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
          GH_TOKEN: ${{ github.token }}
          GIT_TAG: ${{ needs.prepare.outputs.git_tag }}
          KODI_VERSION: ${{ needs.prepare.outputs.kodi_version }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main --tags

          current_main="$(git rev-parse origin/main)"
          if [[ "$current_main" != "$BASE_SHA" ]]; then
            echo "main advanced from ${BASE_SHA} to ${current_main} before the release metadata could be pushed." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${GIT_TAG}" >/dev/null 2>&1; then
            echo "Target tag ${GIT_TAG} already exists; refusing to push duplicate metadata." >&2
            exit 1
          fi

          git push origin HEAD:main
          git tag -a "${GIT_TAG}" -m "Release ${GIT_TAG}"
          git push origin "${GIT_TAG}"
          gh release create "${GIT_TAG}" \
            --title "Release ${RELEASE_VERSION}" \
            --notes "Kodi version: ${KODI_VERSION}"
